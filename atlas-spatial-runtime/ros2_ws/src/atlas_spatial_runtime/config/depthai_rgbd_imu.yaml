/**:
  ros__parameters:
    driver:
      # Setup substitutes the selected OAK MXID here. An empty value retains
      # DepthAI's single-device discovery behavior.
      i_device_id: "$(var device_id)"
      i_enable_ir: false
    pipeline_gen:
      i_pipeline_type: rgbd
      i_nn_type: none
      i_enable_imu: true
      # DepthAI core 3.6.1 aborts Basalt on the installed OAK-D Lite when an
      # IMU sample arrives behind the integrated state. Keep RGB-D and BMI270
      # available while that upstream VIO path remains explicitly opt-in.
      i_enable_vio: false
    imu:
      i_batch_report_threshold: 1
      i_max_batch_reports: 10
      i_enable_rotation: false
