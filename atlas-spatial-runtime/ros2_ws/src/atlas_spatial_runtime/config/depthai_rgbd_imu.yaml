/**:
  ros__parameters:
    driver:
      # Setup substitutes the selected OAK MXID here. An empty value retains
      # DepthAI's single-device discovery behavior.
      i_device_id: "$(var device_id)"
      i_enable_ir: false
    pipeline_gen:
      i_pipeline_type: rgbd
      i_nn_type: none
      i_enable_imu: true
      # Atlas deliberately keeps DepthAI's integrated Basalt node disabled.
      # The official driver owns RGB-D and raw IMU transport; RTAB-Map owns
      # odometry outside the vendor process so estimator overload cannot
      # backpressure the shared camera pipeline.
      i_enable_vio: false
    # Atlas launches the driver with RealSense compatibility, which exposes
    # the stereo module under the "depth" parameter namespace. Keep cloud
    # geometry on Luxonis's supported RTAB-Map DEFAULT profile; the unused
    # "stereo" namespace would silently leave FAST_ACCURACY active.
    depth:
      i_aligned: true
      i_board_socket_id: 0
      i_synced: true
      i_depth_preset: DEFAULT
      # DepthAI 3.2.1's reversal option changes CameraInfo projection math but
      # does not exchange rectifiedLeft/rectifiedRight image outputs. Keep its
      # internal RGB-D convention unchanged; the Atlas provider adapter below
      # owns the ROS/OpenCV mono ordering and projection contract.
      i_reverse_stereo_socket_order: false
      i_left_rect_publish_topic: true
      i_right_rect_publish_topic: true
    rgb:
      i_synced: true
    imu:
      i_batch_report_threshold: 1
      i_max_batch_reports: 10
      i_enable_rotation: false
