syntax = "proto3";

package atlas.groundstation.v1;

option go_package = "github.com/sunnyside/atlas/atlas-agent/internal/transport/groundstationpb;groundstationpb";

// GroundStationService is hosted by the native Atlas application. The onboard
// agent initiates this session and keeps reconnecting while the HM30 path is
// available. Registration must be the first message on every new session.
service GroundStationService {
  rpc OpenSession(stream AgentToGroundStation) returns (stream GroundStationToAgent);

  // Perception is isolated from the command/telemetry session so high-rate
  // detection updates cannot delay safety-critical command acknowledgements.
  // The first message must register the perception stream against an active
  // agent session.
  rpc OpenPerceptionStream(stream AgentPerception) returns (stream GroundStationPerception);
}

message AgentToGroundStation {
  string session_id = 1;

  oneof payload {
    AgentRegistration registration = 2;
    AgentHeartbeat heartbeat = 3;
    AircraftTelemetry telemetry = 4;
    AgentStatusText status_text = 5;
    VehicleCommandUpdate command_update = 6;
    MissionRunUpdate mission_run_update = 7;
    AircraftFollowSessionUpdate aircraft_follow_session_update = 8;
  }
}

message GroundStationToAgent {
  oneof payload {
    RegistrationAccepted registration_accepted = 1;
    VehicleCommandRequest command_request = 2;
    VehicleCommandCancellation command_cancellation = 3;
    MissionOperationRequest mission_operation_request = 4;
    MissionReconciliationRequest mission_reconciliation_request = 5;
    AircraftFollowControlRequest aircraft_follow_control_request = 6;
  }
}

// AgentPerception is deliberately accelerator-neutral. Hailo HEF/TAPPAS,
// NVIDIA DeepStream/TensorRT, and software ONNX runtimes must translate their
// native tensor metadata into this contract before crossing the agent boundary.
message AgentPerception {
  string session_id = 1;
  string drone_id = 2;

  oneof payload {
    PerceptionStreamRegistration registration = 3;
    PerceptionFrame frame = 4;
    PerceptionHealth health = 5;
    PerceptionTrackUpdateBatch track_updates = 6;
  }
}

message GroundStationPerception {
  oneof payload {
    PerceptionStreamAccepted stream_accepted = 1;
    PerceptionFrameSubscription frame_subscription = 2;
    PerceptionCountingRuleSet counting_rules = 3;
  }
}

enum PerceptionFrameSubscriptionAction {
  PERCEPTION_FRAME_SUBSCRIPTION_ACTION_UNSPECIFIED = 0;
  PERCEPTION_FRAME_SUBSCRIPTION_ACTION_START_OR_RENEW = 1;
  PERCEPTION_FRAME_SUBSCRIPTION_ACTION_STOP = 2;
}

// Native renews short consumer leases while a live view is mounted. The agent
// keeps inference and health reporting active but suppresses high-rate frame
// metadata when no subscription or active mission requires it.
message PerceptionFrameSubscription {
  string subscription_id = 1;
  string purpose = 2;
  PerceptionFrameSubscriptionAction action = 3;
  int64 lease_duration_ms = 4;
}

message PerceptionStreamRegistration {
  string stream_id = 1;
  string installation_id = 2;
  string protocol_version = 3;
  string provider = 4;
  repeated string capabilities = 5;
  int64 observed_at_unix_ms = 6;
}

message PerceptionStreamAccepted {
  string stream_id = 1;
  int64 accepted_at_unix_ms = 2;
}

message PerceptionFrame {
  string source_id = 1;
  string stream_epoch = 2;
  string frame_id = 3;
  int64 observed_at_unix_ms = 4;
  int64 source_pts_ns = 5;
  uint32 image_width = 6;
  uint32 image_height = 7;
  PerceptionModelIdentity model = 8;
  double inference_latency_ms = 9;
  repeated PerceptionDetection detections = 10;
}

message PerceptionModelIdentity {
  string name = 1;
  string version = 2;
  string artifact_hash = 3;
}

message PerceptionDetection {
  string track_id = 1;
  int32 class_id = 2;
  string class_label = 3;
  double confidence = 4;
  NormalizedBoundingBox bounding_box = 5;
  string attributes_json = 6;
}

// Lifecycle updates are independent of frame subscriptions so Native can
// persist track state even when no high-rate live-video consumer is mounted.
message PerceptionTrackUpdateBatch {
  string source_id = 1;
  string stream_epoch = 2;
  string track_session_id = 3;
  string tracker_type = 4;
  int64 observed_at_unix_ms = 5;
  bool session_started = 6;
  bool session_ended = 7;
  string session_end_reason = 8;
  repeated PerceptionTrackSnapshot tracks = 9;
  uint64 current_visible = 10;
  uint64 unique_confirmed = 11;
  repeated PerceptionTrackRuleCount rule_counts = 12;
  repeated PerceptionTrackCountEvent count_events = 13;
}

message NormalizedPoint {
  double x = 1;
  double y = 2;
}

// Native replaces the complete active rule set for one source. Rules use
// normalized image coordinates so they remain independent of decoder size.
message PerceptionCountingRuleSet {
  string source_id = 1;
  repeated PerceptionCountingRule rules = 2;
}

message PerceptionCountingRule {
  string rule_id = 1;
  string label = 2;
  string rule_type = 3;
  uint64 revision = 4;
  repeated NormalizedPoint points = 5;
  repeated int32 class_ids = 6;
}

message PerceptionTrackRuleCount {
  string rule_id = 1;
  uint64 rule_revision = 2;
  string rule_type = 3;
  uint64 line_forward = 4;
  uint64 line_reverse = 5;
  uint64 polygon_entries = 6;
  uint64 polygon_exits = 7;
}

message PerceptionTrackCountEvent {
  string event_id = 1;
  string rule_id = 2;
  uint64 rule_revision = 3;
  string track_session_id = 4;
  string track_id = 5;
  string event_type = 6;
  int64 observed_at_unix_ms = 7;
  NormalizedPoint anchor = 8;
}

message PerceptionTrackSnapshot {
  string track_id = 1;
  string track_session_id = 2;
  string tracker_type = 3;
  string lifecycle_state = 4;
  uint64 revision = 5;
  uint64 age_frames = 6;
  uint64 observation_count = 7;
  int64 first_observed_at_unix_ms = 8;
  int64 last_observed_at_unix_ms = 9;
  NormalizedBoundingBox latest_confirmed_box = 10;
  double latest_detection_confidence = 11;
  NormalizedBoundingBox predicted_box = 12;
  double prediction_confidence = 13;
  int64 closed_at_unix_ms = 14;
  string closure_reason = 15;
  int32 class_id = 16;
  string class_label = 17;
  string update_reason = 18;
}

message NormalizedBoundingBox {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
}

message PerceptionHealth {
  string source_id = 1;
  string provider = 2;
  string accelerator = 3;
  bool input_connected = 4;
  bool inference_ready = 5;
  bool output_publishing = 6;
  double input_fps = 7;
  double inference_fps = 8;
  uint64 dropped_frames = 9;
  int64 last_frame_at_unix_ms = 10;
  int64 last_detection_at_unix_ms = 11;
  string last_error = 12;
  PerceptionModelIdentity model = 13;
  int64 observed_at_unix_ms = 14;
  // ACTIVE and INACTIVE are healthy observed states. FAILED means the runtime
  // could not satisfy its desired activation state.
  string activation_state = 15;
  PerceptionTrackingHealth tracking = 16;
}

// Tracking health describes temporary object association, not the identity of
// a person or vehicle. session_id changes whenever continuity is not safe.
message PerceptionTrackingHealth {
  string algorithm = 1;
  string state = 2;
  string session_id = 3;
  string last_reset_reason = 4;
  uint64 reset_count = 5;
  string last_error = 6;
  string camera_motion_state = 7;
  string camera_motion_method = 8;
  double camera_motion_confidence = 9;
  bool re_id_enabled = 10;
}

message AgentRegistration {
  string registration_request_id = 1;
  string installation_id = 2;
  string agent_version = 3;
  string protocol_version = 4;
  DeviceProfile device = 5;
  DroneProfile drone = 6;
  FlightControllerAttachment flight_controller = 7;
  repeated string capabilities = 8;
  int64 observed_at_unix_ms = 9;
}

message DeviceProfile {
  string device_name = 1;
  string hostname = 2;
  string operating_system = 3;
  string architecture = 4;
  string hardware_id = 5;
  string hardware_id_source = 6;
  uint64 total_memory_bytes = 7;
}

message DroneProfile {
  string drone_id = 1;
  string name = 2;
  string flight_controller_uid = 3;
  string serial_number = 4;
  string vehicle_type = 5;
}

message FlightControllerAttachment {
  string transport = 1;
  string endpoint_description = 2;
  uint32 baud_rate = 3;
  uint32 mavlink_system_id = 4;
  uint32 mavlink_component_id = 5;
}

message AgentHeartbeat {
  int64 observed_at_unix_ms = 1;
}

// AircraftTelemetry is a latest-value operational snapshot produced from
// MAVSDK. Optional fields preserve the difference between a legitimate zero
// and a value that the flight controller has not reported yet.
message AircraftTelemetry {
  int64 observed_at_unix_ms = 1;
  string source = 2;
  optional double battery_percent = 3;
  optional double relative_altitude_m = 4;
  optional string flight_mode = 5;
  optional bool armed = 6;
  optional bool in_air = 7;
  optional double latitude = 8;
  optional double longitude = 9;
  optional double heading_deg = 10;
  optional double ground_speed_mps = 11;
  optional string gps_fix = 12;
  optional uint32 satellites_visible = 13;
  optional bool home_position_set = 14;
  repeated BatteryTelemetry batteries = 15;
  VehicleHealth health = 16;
  optional double absolute_altitude_m = 17;
  optional double terrain_altitude_m = 18;
  optional double bottom_clearance_m = 19;
  optional double velocity_north_mps = 20;
  optional double velocity_east_mps = 21;
  optional double velocity_down_mps = 22;
  optional double climb_rate_mps = 23;
  optional string landed_state = 24;
  RcStatus rc_status = 25;
  HomePosition home_position = 26;
  GpsQuality gps_quality = 27;
}

message BatteryTelemetry {
  uint32 id = 1;
  string function = 2;
  optional double remaining_percent = 3;
  optional double voltage_v = 4;
  optional double current_a = 5;
  optional double temperature_c = 6;
  optional double consumed_ah = 7;
  optional double time_remaining_s = 8;
}

message VehicleHealth {
  bool gyrometer_calibration_ok = 1;
  bool accelerometer_calibration_ok = 2;
  bool magnetometer_calibration_ok = 3;
  bool local_position_ok = 4;
  bool global_position_ok = 5;
  bool home_position_ok = 6;
  bool armable = 7;
}

message RcStatus {
  bool available = 1;
  bool was_available_once = 2;
  optional double signal_strength_percent = 3;
}

message HomePosition {
  optional double latitude = 1;
  optional double longitude = 2;
  optional double absolute_altitude_m = 3;
  optional double relative_altitude_m = 4;
}

message GpsQuality {
  optional double hdop = 1;
  optional double vdop = 2;
  optional double horizontal_uncertainty_m = 3;
  optional double vertical_uncertainty_m = 4;
  optional double velocity_uncertainty_mps = 5;
  optional double course_over_ground_deg = 6;
}

// Status text is event data rather than a latest-value telemetry field. Atlas
// stores a bounded recent history so safety and failsafe messages are not lost.
message AgentStatusText {
  int64 observed_at_unix_ms = 1;
  string source = 2;
  string severity = 3;
  string text = 4;
}

message RegistrationAccepted {
  string agent_id = 1;
  string drone_id = 2;
  string binding_id = 3;
  string communication_link_id = 4;
  int64 registered_at_unix_ms = 5;
}

enum VehicleCommandType {
  VEHICLE_COMMAND_TYPE_UNSPECIFIED = 0;
  VEHICLE_COMMAND_TYPE_HOLD = 1;
  VEHICLE_COMMAND_TYPE_RETURN_TO_LAUNCH = 2;
  VEHICLE_COMMAND_TYPE_LAND = 3;
  VEHICLE_COMMAND_TYPE_GIMBAL_SET_ANGLES = 4;
  VEHICLE_COMMAND_TYPE_GIMBAL_SET_RATES = 5;
  VEHICLE_COMMAND_TYPE_GIMBAL_CENTER = 6;
  VEHICLE_COMMAND_TYPE_PAYLOAD_CONTROL_BEGIN = 7;
  VEHICLE_COMMAND_TYPE_PAYLOAD_CONTROL_RENEW = 8;
  VEHICLE_COMMAND_TYPE_PAYLOAD_CONTROL_END = 9;
  VEHICLE_COMMAND_TYPE_GIMBAL_SET_ROI = 10;
  VEHICLE_COMMAND_TYPE_CAMERA_SET_ZOOM = 11;
  VEHICLE_COMMAND_TYPE_GIMBAL_FOLLOW_START = 12;
  VEHICLE_COMMAND_TYPE_GIMBAL_FOLLOW_STOP = 13;
  // Non-actuating request that estimates one exact operator-selected track at
  // its latest frame-aligned aircraft/gimbal state.
  VEHICLE_COMMAND_TYPE_GEOLOCATE_SELECTED_TRACK = 14;
}

enum VehicleCommandUpdateType {
  VEHICLE_COMMAND_UPDATE_TYPE_UNSPECIFIED = 0;
  VEHICLE_COMMAND_UPDATE_TYPE_ACCEPTED = 1;
  VEHICLE_COMMAND_UPDATE_TYPE_REJECTED = 2;
  VEHICLE_COMMAND_UPDATE_TYPE_EXECUTING = 3;
  VEHICLE_COMMAND_UPDATE_TYPE_PROGRESS = 4;
  VEHICLE_COMMAND_UPDATE_TYPE_SUCCEEDED = 5;
  VEHICLE_COMMAND_UPDATE_TYPE_FAILED = 6;
  VEHICLE_COMMAND_UPDATE_TYPE_TIMED_OUT = 7;
  VEHICLE_COMMAND_UPDATE_TYPE_CANCELLED = 8;
  VEHICLE_COMMAND_UPDATE_TYPE_CANCELLATION_REJECTED = 9;
}

message VehicleCommandRequest {
  string command_id = 1;
  string drone_id = 2;
  VehicleCommandType command_type = 3;
  string parameters_json = 4;
  int64 created_at_unix_ms = 5;
  int64 delivered_at_unix_ms = 6;
  int64 deadline_at_unix_ms = 7;
}

message VehicleCommandCancellation {
  string command_id = 1;
  int64 requested_at_unix_ms = 2;
}

message VehicleCommandUpdate {
  string event_id = 1;
  string command_id = 2;
  VehicleCommandUpdateType update_type = 3;
  int64 observed_at_unix_ms = 4;
  optional double progress_percent = 5;
  string result_code = 6;
  string message = 7;
  string evidence_json = 8;
}

// Aircraft following is a separate supervised navigation authority. It never
// follows image-space pixels and does not inherit a gimbal-follow lease.
enum AircraftFollowControlAction {
  AIRCRAFT_FOLLOW_CONTROL_ACTION_UNSPECIFIED = 0;
  AIRCRAFT_FOLLOW_CONTROL_ACTION_START = 1;
  AIRCRAFT_FOLLOW_CONTROL_ACTION_RENEW = 2;
  AIRCRAFT_FOLLOW_CONTROL_ACTION_HOLD = 3;
  AIRCRAFT_FOLLOW_CONTROL_ACTION_END = 4;
}

message AircraftFollowEnvelope {
  double standoff_m = 1;
  double altitude_relative_m = 2;
  double minimum_altitude_relative_m = 3;
  double maximum_altitude_relative_m = 4;
  double maximum_ground_speed_m_s = 5;
  double maximum_acceleration_m_s2 = 6;
  int64 maximum_duration_ms = 7;
  double boundary_center_latitude = 8;
  double boundary_center_longitude = 9;
  double boundary_radius_m = 10;
  double minimum_battery_percent = 11;
  double minimum_track_confidence = 12;
  double maximum_geolocation_uncertainty_m = 13;
  double maximum_velocity_uncertainty_m_s = 14;
}

message AircraftFollowTargetState {
  string geolocation_id = 1;
  string selection_id = 2;
  string source_id = 3;
  string track_session_id = 4;
  string track_id = 5;
  int64 observed_at_unix_ms = 6;
  double latitude = 7;
  double longitude = 8;
  double altitude_amsl_m = 9;
  double velocity_north_m_s = 10;
  double velocity_east_m_s = 11;
  double horizontal_uncertainty_m = 12;
  double velocity_uncertainty_m_s = 13;
  double track_confidence = 14;
  string lifecycle_state = 15;
  string motion_status = 16;
}

message AircraftFollowControlRequest {
  string operation_id = 1;
  string follow_session_id = 2;
  string drone_id = 3;
  AircraftFollowControlAction action = 4;
  AircraftFollowEnvelope envelope = 5;
  AircraftFollowTargetState target = 6;
  int64 operator_lease_expires_at_unix_ms = 7;
  int64 requested_at_unix_ms = 8;
  string reason_code = 9;
  string reason = 10;
  string validation_reference = 11;
}

enum AircraftFollowSessionUpdateType {
  AIRCRAFT_FOLLOW_SESSION_UPDATE_TYPE_UNSPECIFIED = 0;
  AIRCRAFT_FOLLOW_SESSION_UPDATE_TYPE_VALIDATING = 1;
  AIRCRAFT_FOLLOW_SESSION_UPDATE_TYPE_ACQUIRING = 2;
  AIRCRAFT_FOLLOW_SESSION_UPDATE_TYPE_FOLLOWING = 3;
  AIRCRAFT_FOLLOW_SESSION_UPDATE_TYPE_DEGRADED_HOLD = 4;
  AIRCRAFT_FOLLOW_SESSION_UPDATE_TYPE_ENDED = 5;
  AIRCRAFT_FOLLOW_SESSION_UPDATE_TYPE_REJECTED = 6;
}

message AircraftFollowSessionUpdate {
  string event_id = 1;
  string operation_id = 2;
  string follow_session_id = 3;
  AircraftFollowSessionUpdateType update_type = 4;
  int64 observed_at_unix_ms = 5;
  string reason_code = 6;
  string message = 7;
  string evidence_json = 8;
}

// Mission operations use the same durable request/update boundary as vehicle
// commands, while retaining a mission-specific lifecycle and progress model.
enum MissionOperationType {
  MISSION_OPERATION_TYPE_UNSPECIFIED = 0;
  MISSION_OPERATION_TYPE_UPLOAD = 1;
  MISSION_OPERATION_TYPE_START = 2;
  MISSION_OPERATION_TYPE_PAUSE = 3;
  MISSION_OPERATION_TYPE_RESUME = 4;
  MISSION_OPERATION_TYPE_CANCEL = 5;
  MISSION_OPERATION_TYPE_RETURN_TO_LAUNCH = 6;
}

enum MissionRunUpdateType {
  MISSION_RUN_UPDATE_TYPE_UNSPECIFIED = 0;
  MISSION_RUN_UPDATE_TYPE_OPERATION_ACCEPTED = 1;
  MISSION_RUN_UPDATE_TYPE_UPLOAD_PROGRESS = 2;
  MISSION_RUN_UPDATE_TYPE_UPLOADED = 3;
  MISSION_RUN_UPDATE_TYPE_STARTED = 4;
  MISSION_RUN_UPDATE_TYPE_PROGRESS = 5;
  MISSION_RUN_UPDATE_TYPE_PAUSED = 6;
  MISSION_RUN_UPDATE_TYPE_RESUMED = 7;
  MISSION_RUN_UPDATE_TYPE_COMPLETED = 8;
  MISSION_RUN_UPDATE_TYPE_CANCELLED = 9;
  MISSION_RUN_UPDATE_TYPE_RTL_STARTED = 10;
  MISSION_RUN_UPDATE_TYPE_OPERATION_FAILED = 11;
  MISSION_RUN_UPDATE_TYPE_ARMING = 12;
  MISSION_RUN_UPDATE_TYPE_ARMED = 13;
  MISSION_RUN_UPDATE_TYPE_PAYLOAD_MANUAL_STARTED = 14;
  MISSION_RUN_UPDATE_TYPE_PAYLOAD_MISSION_RESTORED = 15;
  MISSION_RUN_UPDATE_TYPE_PAYLOAD_RESTORE_FAILED = 16;
  // Runtime mission actions are reported through the mission stream so their
  // acknowledgement remains ordered with flight progress for the same run.
  MISSION_RUN_UPDATE_TYPE_ACTION_STATE_CHANGED = 17;
  MISSION_RUN_UPDATE_TYPE_RECONCILIATION_ACCEPTED = 18;
  MISSION_RUN_UPDATE_TYPE_RECONCILIATION_FAILED = 19;
}

enum MissionActionState {
  MISSION_ACTION_STATE_UNSPECIFIED = 0;
  MISSION_ACTION_STATE_REQUESTED = 1;
  MISSION_ACTION_STATE_RUNNING = 2;
  MISSION_ACTION_STATE_RETRYING = 3;
  MISSION_ACTION_STATE_SUCCEEDED = 4;
  MISSION_ACTION_STATE_FAILED = 5;
  MISSION_ACTION_STATE_POLICY_APPLIED = 6;
}

message MissionOperationRequest {
  string operation_id = 1;
  string mission_run_id = 2;
  string drone_id = 3;
  MissionOperationType operation_type = 4;
  // Present for upload only. This is the immutable native MissionPlan snapshot.
  string mission_plan_json = 5;
  int64 requested_at_unix_ms = 6;
  int64 deadline_at_unix_ms = 7;
}

// Native sends its durable run/action checkpoints after every Agent session
// registration. The Agent must first prove that PX4 still holds the immutable
// mission before associating its in-memory executor with the run.
message MissionReconciliationRequest {
  string reconciliation_id = 1;
  string mission_run_id = 2;
  string drone_id = 3;
  string run_state = 4;
  string mission_plan_json = 5;
  optional uint32 current_waypoint = 6;
  uint32 total_waypoints = 7;
  repeated MissionActionCheckpoint actions = 8;
  int64 requested_at_unix_ms = 9;
  int64 deadline_at_unix_ms = 10;
}

message MissionActionCheckpoint {
  uint32 action_sequence = 1;
  string action_type = 2;
  string state = 3;
  uint32 attempt = 4;
  optional int64 attempt_deadline_at_unix_ms = 5;
  optional int64 next_attempt_at_unix_ms = 6;
}

message MissionRunUpdate {
  string event_id = 1;
  string operation_id = 2;
  string mission_run_id = 3;
  MissionRunUpdateType update_type = 4;
  // Agent-reported run state allows a failed control operation to preserve an
  // otherwise healthy READY, RUNNING, or PAUSED run.
  string run_state = 5;
  int64 observed_at_unix_ms = 6;
  optional double progress_percent = 7;
  optional uint32 current_waypoint = 8;
  optional uint32 total_waypoints = 9;
  string error_code = 10;
  string message = 11;
  string evidence_json = 12;
  optional uint32 action_sequence = 13;
  string action_type = 14;
  MissionActionState action_state = 15;
  uint32 action_attempt = 16;
  string failure_policy = 17;
}
