services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${ATLAS_DB_NAME:-atlas}
      POSTGRES_USER: ${ATLAS_DB_USER:-atlas}
      POSTGRES_PASSWORD: ${ATLAS_DB_PASSWORD:-atlas}
    ports:
      - "${ATLAS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - atlas-onboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ATLAS_DB_NAME: ${ATLAS_DB_NAME:-atlas}
      ATLAS_DB_USER: ${ATLAS_DB_USER:-atlas}
      PGPASSWORD: ${ATLAS_DB_PASSWORD:-atlas}
    volumes:
      - ./atlas-backend/migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        for migration in /migrations/*.sql; do
          echo "applying $${migration##*/}"
          psql -h postgres -p 5432 -U "$${ATLAS_DB_USER}" -d "$${ATLAS_DB_NAME}" -v ON_ERROR_STOP=1 -f "$${migration}"
        done
    restart: "no"

  atlas-backend:
    image: golang:1.25-alpine
    working_dir: /workspace/atlas-backend
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ATLAS_BACKEND_ADDR: :8080
      ATLAS_VEHICLE_AGENT_GRPC_ADDR: :9090
      ATLAS_DATABASE_URL: postgres://${ATLAS_DB_USER:-atlas}:${ATLAS_DB_PASSWORD:-atlas}@postgres:5432/${ATLAS_DB_NAME:-atlas}?sslmode=disable
      ATLAS_LOCAL_INPUTS_ENABLED: ${ATLAS_LOCAL_INPUTS_ENABLED:-true}
      ATLAS_LOCAL_VIDEO_RTSP_URL: ${ATLAS_LOCAL_VIDEO_RTSP_URL:-rtsp://192.168.144.168:8554/atlas}
    ports:
      - "${ATLAS_BACKEND_HTTP_PORT:-8080}:8080"
      - "${ATLAS_BACKEND_GRPC_PORT:-9090}:9090"
    volumes:
      - .:/workspace:ro
      - atlas-onboard-go-build-cache:/root/.cache/go-build
      - atlas-onboard-go-mod-cache:/go/pkg/mod
    command: ["go", "run", "./cmd/atlas-backend"]
    restart: unless-stopped

  atlas-ngrok-tcp:
    image: ngrok/ngrok:alpine
    depends_on:
      atlas-backend:
        condition: service_started
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN before starting the tunnel}
      NGROK_TCP_URL: ${NGROK_TCP_URL:-}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        if [ -n "$${NGROK_TCP_URL}" ]; then
          remote_addr="$${NGROK_TCP_URL#tcp://}"
          exec ngrok tcp --log=stdout --log-format=logfmt --url "$${remote_addr}" atlas-backend:9090
        fi
        exec ngrok tcp --log=stdout --log-format=logfmt atlas-backend:9090
    restart: unless-stopped

volumes:
  atlas-onboard-postgres-data:
  atlas-onboard-go-build-cache:
  atlas-onboard-go-mod-cache:
